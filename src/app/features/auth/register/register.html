<div class="login-wrapper">
  <div class="login-card">

  <div class="logo">
    <img src="munazm-logo.png" alt="Munazm" class="logo-img" />
  </div>

    <p class="login-subtitle">Create your account</p>

    <form (ngSubmit)="onSubmit()">

      <div class="name-fields mb-3">
        <div>
          <label class="form-label">First Name*</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="firstName"
            name="firstName"
            placeholder="First"
            required
          />
        </div>
        <div>
          <label class="form-label">Middle Name</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="middleName"
            name="middleName"
            placeholder="Middle"
          />
        </div>
        <div>
          <label class="form-label">Last Name*</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="lastName"
            name="lastName"
            placeholder="Last"
            required
          />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email*</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Password*</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }

      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        Create Account
      </button>

    </form>

     <!-- <p class="login-footer">
      * Required fields
    </p> -->
    <p class="login-footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>

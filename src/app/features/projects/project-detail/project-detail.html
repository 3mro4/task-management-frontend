<h2>Project Details</h2>

<div *ngIf="isLoading">
  <p>Loading...</p>
</div>

<div *ngIf="errorMessage">
  <p>{{ errorMessage }}</p>
</div>

<div *ngIf="!isLoading && project">
  <p><strong>Name:</strong> {{ project.name }}</p>
  <p><strong>Description:</strong> {{ project.description }}</p>
  <p><strong>Created At:</strong> {{ project.createdAt | date }}</p>

  <h3>Current Members</h3>
  <ul *ngIf="project.currentMembers.length > 0; else noMembers">
    <li *ngFor="let member of project.currentMembers">{{ member }}</li>
  </ul>

  <ng-template #noMembers>
    <p>No members found.</p>
  </ng-template>

  <h3>Tasks By Priority</h3>
  <ul *ngIf="getPriorityEntries().length > 0; else noTasks">
    <li *ngFor="let item of getPriorityEntries()">
      {{ item.key }}: {{ item.value }}
    </li>
  </ul>

  <ng-template #noTasks>
    <p>No task data found.</p>
  </ng-template>
</div>

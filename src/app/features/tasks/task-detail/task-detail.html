<div class="page" *ngIf="task">

  <div class="header">
    <h1>{{ task.title }}</h1>
    <button class="primary">Edit</button>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Task Details</h3>

      <p><strong>Title:</strong> {{ task.title }}</p>
      <p><strong>Description:</strong> {{ task.description }}</p>

      <div class="row">
        <p><strong>Due:</strong> {{ task.dueDate | date }}</p>
        <p><strong>Created:</strong> {{ task.createdAt | date }}</p>
      </div>
    </div>

    <div class="card">
      <h3>Metadata</h3>

      <p>Status: <span class="badge">{{ task.status }}</span></p>
      <p>Priority: <span class="badge">{{ task.priority }}</span></p>
      <p>Project: {{ task.projectName }}</p>
      <p>Assignee: {{ task.assigneeName }}</p>
    </div>

  </div>

</div>

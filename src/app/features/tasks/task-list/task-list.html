<div class="page">

  <div class="header">
    <h1>Tasks</h1>
    <button class="primary">+ New Task</button>
  </div>

  <div class="search-box">
    <input type="text" placeholder="Search tasks..." />
  </div>

  <div class="table-card">

    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Assignee</th>
          <th>Project</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Due Date</th>
          <th></th>
        </tr>
      </thead>

     <tbody>
  @for (task of tasks; track task.id) {
    <tr>
      <td class="bold">{{ task.title }}</td>
      <td>{{ task.assigneeName }}</td>
      <td>{{ task.projectName }}</td>
      <td>
        <span class="badge priority" [ngClass]="task.priority.toLowerCase()">
          {{ task.priority }}
        </span>
      </td>
      <td>
        <span class="badge status" [ngClass]="task.status.toLowerCase()">
          {{ task.status }}
        </span>
      </td>
      <td>{{ task.dueDate | date }}</td>
      <td class="actions">👁 🗑</td>
    </tr>
  }
  @if (tasks.length === 0) {
    <tr>
      <td colspan="7" class="text-center text-muted py-4">No tasks found.</td>
    </tr>
  }
</tbody>
    </table>

  </div>
</div>
